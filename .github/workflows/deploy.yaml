################################################################################
# GitHub Actions — CI/CD pipeline for the Travel Planner
#
# Flow: test  →  build-deploy (on push to main)
#
# Required GitHub secrets:
#   GCP_SA_KEY     — Full contents of the service account JSON key file
#   GCP_PROJECT_ID — Google Cloud project ID (promptwars-rr)
################################################################################

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  REGION: us-central1
  SERVICE: travel-planner
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/travel-planner

jobs:
  # ============================================================================
  # Job 1 — Run the test suite
  # ============================================================================
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Run pytest
        run: python -m pytest backend/tests/ -v --tb=short

  # ============================================================================
  # Job 2 — Build Docker image and deploy to Cloud Run
  # ============================================================================
  build-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Allow the Docker client to push to GCR using the gcloud credential helper.
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ------------------------------------------------------------------------
      # Build multi-stage image and tag with both the commit SHA and `latest`
      # ------------------------------------------------------------------------
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: docker push --all-tags ${{ env.IMAGE }}

      # ------------------------------------------------------------------------
      # Deploy the new revision to Cloud Run
      # ------------------------------------------------------------------------
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --port=8080 \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)"
